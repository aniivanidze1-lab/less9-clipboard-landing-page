<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>შესვლა</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="wrapper">
                <h1>შესვლა</h1>
                <form class="form">
            <div class="inputbox">
                <label for="email">მეილი</label>
                <input class="input" id="email" name="email" type="email">
            </div>
            <div class="inputbox">
                 <label for="password">პაროლი</label>
                <input class="input" type="password" name="password" id="password" required>
            </div>
            <div class="forget">
                <label for="remember">დამახსოვრება</label>
                <input class="input" type="checkbox" name="remember" id="remember">
               <a class="link"href="#">დაგავიწყდა პაროლი?</a>
            </div>
            <button class="btn">შესვლა</button>
            <div class="register">
                <p>არ გაქვს ექაუნთი? <a class="link" href="#">რეგისტრაცია</a></p>
            </div>
        </form>
            </div>
        </div>
    </main>
</body>
</html>
